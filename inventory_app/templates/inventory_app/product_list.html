{% extends 'inventory_app/base.html' %}
{% block content %}
<h2>Products</h2>
<a href="{% url 'product_create' %}" class="btn btn-primary mb-3">Add Product</a>
<table class="table table-striped">
    <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Actions</th>
    </tr>
    {% for product in products %}
    <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.category }}</td>
        <td>{{ product.price }}</td>
        <td>{{ product.stock_quantity }}</td>
        <td>
            <a href="{% url 'product_update' product.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
            <a href="{% url 'product_delete' product.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
