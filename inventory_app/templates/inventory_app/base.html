<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Inventory System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'home' %}">Inventory System</a>
            <div>
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'product_list' %}">Products</a>
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'customer_list' %}">Customers</a>
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'order_list' %}">Orders</a>
                <a class="btn btn-outline-light btn-sm me-2" href="{% url 'order_create' %}">New Order</a>

                {% if user.is_authenticated %}
                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
                {% else %}
                <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
