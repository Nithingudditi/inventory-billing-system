<!DOCTYPE html>
<html>
<head>
    <title>Create Order</title>
</head>
<body>
    <h2>Create Order</h2>
    <form method="post">
        {% csrf_token %}

        <h3>Customer</h3>
        {{ form.as_p }}

        <h3>Products</h3>
        {{ formset.management_form }}
        <table border="1">
            <tr>
                <th>Product</th>
                <th>Quantity</th>
                <th>Price at Purchase</th>
            </tr>
            {% for item_form in formset %}
            <tr>
                <td>{{ item_form.product }}</td>
                <td>{{ item_form.quantity }}</td>
                <td>{{ item_form.price_at_purchase }}</td>
            </tr>
            {% endfor %}
        </table>

        <button type="submit">Create Order</button>
    </form>
</body>
</html>
